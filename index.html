<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADURI'S PORTFOLIO</title>
    
    <link rel="stylesheet" href="styles/main.css"> 
</head>
<body >

    <header >
        <div class="logo">Dasari Maduri</div>

        <div class="theme-toggle-group">
            <button class="theme-toggle"><img src="images/icons/dark.png" alt="Dark Mode"></button>
            <button class="theme-toggle"><img src="images/icons/light.png" alt="Light Mode"></button>
        </div>

        <nav>
            <ul>
                <li><a href="#home-section" class="active">Home</a></li>
                <li><a href="#about-section">About</a></li>
                <li><a href="#skills-section">Skills</a></li>
                <li><a href="#project-section">Projects</a></li>
                <li><a href="#certificate-section">Certification</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <button class="menu-btn" id="menu-btn"><img src="images/icons/menu.png" alt="menu-icon"></button>
    </header>

    <main>
        <iframe 
            src="home.html" 
            id="home-section" 
            class="content-iframe" 
            title="Home Section ">
        </iframe>

        <iframe 
            src="about.html" 
            id="about-section" 
            class="content-iframe" 
            title="About Section ">
        </iframe>
        <iframe
            src="skills.html"
            id="skills-section" 
            class="content-iframe" 
            title="Skills Section ">
            
        </iframe>
        <iframe
            src="projects.html"
            id="project-section" 
            class="content-iframe" 
            title="project Section ">
            
        </iframe>
        <iframe
            src="certificates.html"
            id="certificate-section" 
            class="content-iframe" 
            title="certificates Section ">
            
        </iframe>
        <iframe
            src="contact.html"
            id="contact" 
            class="content-iframe" 
            title="contact Section ">
            
        </iframe>
    </main>
    <footer class="footer">
    <div class="f-content">

    <p class="f-text">
      Made with ❤️ in India • @ 2025 <strong >Dasari Maduri</strong>
    </p>

    <div class="f-buttons">
    
      <button class="footer-btn call-btn"><img src="images/icons/call.png"></button>
      <button class="footer-btn email-btn"> <img src="images/icons/mail.png"></button>
    </div>

  </div>
</footer>

</body>
</html>
