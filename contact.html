<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Section</title>
  <link rel="stylesheet" href="styles/contact.css">
</head>
<body>

  <section id="contact">
    <h2 class="c-heading">
      GET IN <span>TOUCH</span>
    </h2>
    <p class="text">
      Interested in working together or exploring opportunities? I’d love to contribute my skills to your team.
    </p>
   
    <article class="contact-card">
      <h3 class="form-title">Let's Connect </h3>

      <form class="form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="number" name="phone number" placeholder="Your phone Number ">
        <textarea name="message" rows="4" placeholder="Your Message" required></textarea>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </article>
  </section>
  

</body>
</html>
