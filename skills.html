<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Skills</title>
  <link rel="stylesheet" href="styles/skills.css">
</head>
<body>
  <main class="container">
    <h1>My Skills</h1>
    <p>Each skill is a step forward in my journey as a developer</p>

    <section class="skills-section">
      <article class="s-card">
        <div class="s-header">
          <h3>HTML & CSS</h3>
          <span>90%</span>
        </div>
        <div class="line">
          <div class="percent html"></div>
        </div>
      </article>

      <article class="s-card">
        <div class="s-header">
          <h3>JavaScript</h3>
          <span>85%</span>
        </div>
        <div class="line">
          <div class="percent js"></div>
        </div>
      </article>

      <article class="s-card">
        <div class="s-header">
          <h3>Python</h3>
          <span>80%</span>
        </div>
        <div class="line">
          <div class="percent python"></div>
        </div>
      </article>

      <article class="s-card">
        <div class="s-header">
          <h3>SQL</h3>
          <span>85%</span>
        </div>
        <div class="line">
          <div class="percent sql"></div>
        </div>
      </article>

      <article class="s-card">
        <div class="s-header">
          <h3>React</h3>
          <span>80%</span>
        </div>
        <div class="line">
          <div class="percent react"></div>
        </div>
      </article>

      <article class="s-card">
        <div class="s-header">
          <h3>Node.js</h3>
          <span>90%</span>
        </div>
        <div class="line">
          <div class="percent node"></div>
        </div>
      </article>
      <article class="s-card">
        <div class="s-header">
          <h3>Java</h3>
          <span>60%</span>
        </div>
        <div class="line">
          <div class="percent java"></div>
        </div>
      </article>
      <article class="s-card">
        <div class="s-header">
          <h3>C</h3>
          <span>80%</span>
        </div>
        <div class="line">
          <div class="percent C"></div>
        </div>
        
      </article>
      <article class="s-card">
        <div class="s-header">
          <h3>Team Work</h3>
          <span>90%</span>
        </div>
        <div class="line">
          <div class="percent Teamwork"></div>
        </div>
      </article>
      <article class="s-card">
        <div class="s-header">
          <h3>Communication skills</h3>
          <span>90%</span>
        </div>
        <div class="line">
          <div class="percent Communication"></div>
        </div>
      </article>
      <article class="s-card">
        <div class="s-header">
          <h3>Time Management</h3>
          <span>95%</span>
        </div>
        <div class="line">
          <div class="percent Timemanagement"></div>
        </div>

      </article>

    </section>
  </main>
</body>
</html>
